<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OrbitBlocker | Link Check</title>
    <link rel="stylesheet" href="blocked-navigation.css" />
  </head>
  <body>
    <main class="warning-shell" role="main" aria-labelledby="warningTitle">
      <header>
        <p class="eyebrow">OrbitBlocker</p>
        <h1 id="warningTitle">Link safety check</h1>
      </header>

      <p class="lead-copy">
        This link looks suspicious. Review it and choose what to do.
      </p>

      <section class="details-card" aria-label="Navigation details">
        <p class="reason" id="reasonText">Reason: suspicious redirect pattern.</p>
        <dl>
          <div class="detail-row">
            <dt>Current blocked link</dt>
            <dd id="blockedUrlValue"></dd>
          </div>
          <div class="detail-row">
            <dt>Destination</dt>
            <dd id="targetUrlValue"></dd>
          </div>
          <div class="detail-row">
            <dt>Source page</dt>
            <dd id="sourceUrlValue"></dd>
          </div>
        </dl>
      </section>

      <p id="statusText" class="status-text" aria-live="polite"></p>

      <section class="action-row" aria-label="Actions">
        <button id="goBackButton" class="action-button secondary" type="button">Go Back</button>
        <button id="proceedButton" class="action-button primary" type="button">Proceed Once</button>
        <button id="trustSiteButton" class="action-button trust" type="button">Always Allow This Site</button>
      </section>
    </main>

    <script src="blocked-navigation.js" type="module"></script>
  </body>
</html>
